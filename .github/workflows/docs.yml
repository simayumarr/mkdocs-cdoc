name: Deploy Docs

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Install mkdocs-cdoc and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mkdocs-material pymdown-extensions

      # Build the project documentation site
      - name: Build documentation site
        run: |
          mkdocs build -f mkdocs.yml -d _site

      # Build the example project and embed it under _site/example-site/
      - name: Build example project
        run: |
          cd example
          mkdocs build -d ../_site/example-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
