name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov flake8 pylint mypy mkdocs

      - name: Run flake8
        run: |
          flake8 .

      - name: Run pylint
        run: |
          pylint mkdocs_cdoc

      - name: Run mypy
        run: |
          mypy mkdocs_cdoc --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest --cov=mkdocs_cdoc --cov-report=term-missing

      - name: Build documentation
        run: |
          mkdocs build
